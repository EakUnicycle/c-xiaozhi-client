name: Build Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ---------------- VCPKG ----------------
      - name: Clone vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          bootstrap-vcpkg.bat

      - name: Install dependencies
        run: |
          vcpkg/vcpkg install openssl opus paho-mqttpp3

      # ---------------- QT ----------------
      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtmultimedia qtwebsockets'
          cache: true

      # ---------------- CMAKE ----------------
      - name: Configure CMake
        run: |
          cmake -B build -S . -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ---------------- BUILD ----------------
      - name: Build
        run: cmake --build build --config Release

      # ---------------- DEPLOY ----------------
      - name: Deploy
        shell: cmd
        run: |
          mkdir release
          copy build\Release\XiaozhiClient.exe release\
          windeployqt --release --qmldir qml release\XiaozhiClient.exe

      - name: Create ZIP
        shell: powershell
        run: Compress-Archive -Path release\* -DestinationPath XiaozhiClient-Windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: XiaozhiClient-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
