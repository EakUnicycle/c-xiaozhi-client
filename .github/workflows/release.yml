name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          host: windows
          target: desktop
          cache: true

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . ^
            -DCMAKE_PREFIX_PATH=%Qt6_DIR%

      - name: Build
        run: cmake --build build --config Release

      - name: Find EXE
        shell: cmd
        run: |
          dir build /s

      - name: Deploy Qt
        shell: cmd
        run: |
          mkdir release
          "%Qt6_DIR%\bin\windeployqt.exe" ^
            --release ^
            --qmldir qml ^
            build\Release\XiaozhiClient.exe ^
            --dir release

      - name: Copy executable
        shell: cmd
        run: |
          copy build\Release\XiaozhiClient.exe release\

      - name: Copy QML
        shell: cmd
        run: |
          xcopy qml release\qml /E /I /Y

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive -Path release\* -DestinationPath XiaozhiClient-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XiaozhiClient-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}