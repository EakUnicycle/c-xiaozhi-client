name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          host: windows
          target: desktop
          cache: true

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . -DCMAKE_PREFIX_PATH=%Qt6_DIR%

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        shell: cmd
        run: |
          mkdir release
          copy build\Release\XiaozhiClient.exe release\
          :: ใช้ windeployqt เพื่อรวมไฟล์ DLL ที่จำเป็นมาไว้ในโฟลเดอร์ release
          "%Qt6_DIR%\bin\windeployqt.exe" --release --qmldir qml release\XiaozhiClient.exe

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive -Path release\* -DestinationPath XiaozhiClient-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XiaozhiClient-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}