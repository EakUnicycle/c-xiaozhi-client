name: Build Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtmultimedia qtwebsockets'
          cache: true

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy
        shell: cmd
        run: |
          mkdir release
          copy build\Release\XiaozhiClient.exe release\
          windeployqt --release --qmldir qml release\XiaozhiClient.exe

      - name: Create ZIP
        shell: powershell
        run: Compress-Archive -Path release\* -DestinationPath XiaozhiClient-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XiaozhiClient-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}